<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login / Sign Up</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial;
}

.bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url('bgimage.png') center no-repeat;
    background-size:cover;
    filter:blur(6px) brightness(60%);
    z-index:-1;
}

.box{
    position:relative;
    z-index:1;
    margin:70px auto;
    width:280px;
    background:rgba(0,0,0,.5);
    padding:25px;
    border-radius:10px;
    color:#fff;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:none;
}

.btn{
    width:100%;
    padding:10px;
    background:#0057ff;
    color:white;
    border:none;
    border-radius:6px;
    margin-top:10px;
    cursor:pointer;
}

.btn:hover{
    background:#4da3ff;
    color:black;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="box">
    <h2>Login / Sign Up</h2>

    <input id="em" type="email" placeholder="Email here">
    <input id="pw" type="password" placeholder="Password">

    <button class="btn" onclick="login()">Log In</button>
    <button class="btn" style="background:limegreen;color:black;margin-top:6px"
            onclick="registerUser()">
        Sign Up
    </button>
</div>

<script>
// Load stored users or empty object
let users = JSON.parse(localStorage.getItem("users")) || {};

function saveUsers(){
    localStorage.setItem("users", JSON.stringify(users));
}

function login(){
    let email = document.getElementById("em").value.trim();
    let password = document.getElementById("pw").value.trim();

    if(email === "" || password === ""){
        alert("Please enter your email and password.");
        return;
    }

    // Admin override
    if(email === "admin" && password === "admin"){
        goHome();
        return;
    }

    // Check login
    if(users[email] && users[email] === password){
        goHome();
    } else {
        alert("Incorrect email or password.");
    }
}

function registerUser(){
    let email = document.getElementById("em").value.trim();
    let password = document.getElementById("pw").value.trim();

    if(email === "" || password === ""){
        alert("Enter email + password to register.");
        return;
    }

    if(users[email]){
        alert("Email already registered.");
        return;
    }

    // Save new user
    users[email] = password;
    saveUsers();

    goHome();
}

function goHome(){
    // Redirect to your landing page
    window.location.href = "PRO.html";
}
</script>

</body>
</html>
